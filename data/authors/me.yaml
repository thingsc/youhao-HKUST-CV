bio: |
  Youhao Hu is a Ph.D. candidate in Power Electronics at The Hong Kong University
  of Science and Technology (Guangzhou), supervised by Dr. Wei Han and
  Prof. C. C. Chan. His research interests lie in power electronics, wireless
  power transfer (WPT), motor drive systems, and advanced control techniques
  for energy conversion applications.

