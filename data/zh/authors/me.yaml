name:
  display: 胡友豪
role: 电力电子方向博士研究生
bio: |
  我是香港科技大学（广州）电力电子方向博士研究生胡友豪，师从陈清泉院士和韩伟教授。
  研究方向聚焦于电力电子系统、无线电能传输（WPT）、电机驱动系统以及先进控制理论，
  致力于高效率能量变换系统与智能控制技术的研究与应用。

  在博士期间，我长期从事无线电机系统、高效率无线电能传输系统及先进控制算法研究，
  研究内容涵盖系统建模、控制器设计、嵌入式实现、硬件开发与实验验证等完整研发流程。
  相关成果发表于 IEEE Transactions on Power Electronics、IEEE Transactions on Vehicular
  Technology 等国际期刊，并在无线电机系统、动态无线电能传输及智能控制等方向积累了
  较为丰富的研究与工程实践经验。

  熟练使用 MATLAB/Simulink、Python 和 C 语言开展算法开发与工程实现，具备
  MATLAB/Simulink 自动代码生成、实时控制系统开发以及嵌入式平台部署经验。能够独立完成
  从理论建模、控制算法设计到样机开发、系统集成和实验验证的全过程研发工作，
  兼具理论研究能力与工程落地能力。

