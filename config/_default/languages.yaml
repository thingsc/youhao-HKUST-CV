# Languages
#   Documentation: https://docs.hugoblox.com/reference/language/

# Default language (English) — served at the site root.
en:
  locale: en-us
  contentDir: content/en

# Chinese (Simplified) — served under /zh/.
zh:
  locale: zh-Hans
  contentDir: content/zh
  params:
    hugoblox:
      identity:
        # Site name shown on the Chinese site (replace with your Chinese name).
        name: 胡友豪
      locale:
        # 中文站日期格式：yyyy年mm月dd日（Go 时间格式）
        date_format: "2006年01月02日"
